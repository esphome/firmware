name: Lock

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: lock

jobs:
  lock:
    uses: esphome/workflows/.github/workflows/lock.yml@e7eee2a828517c042794a831f75310959fbf2a16  # 2025.10.0
    with:
      pr-close-days: 1
      issue-close-days: 1
      exclude-label: keep-open
